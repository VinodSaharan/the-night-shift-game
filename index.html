<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Night Shift: Interactive Version</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #111; color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
        }
        #game-container { position: relative; }
        canvas {
            border: 4px solid #333; border-radius: 8px;
            background-color: #fff; cursor: pointer;
        }
        .ui-panel {
            position: absolute; top: 10px; left: 10px;
            background: rgba(0,0,0,0.85); padding: 12px 20px;
            border-radius: 6px; pointer-events: none; min-width: 200px;
        }
        .controls-hint {
            margin-top: 10px; font-size: 14px; color: #aaa; text-align: center;
        }
        .btn-shift {
            margin-top: 15px; padding: 12px 24px;
            font-size: 16px; font-weight: bold; cursor: pointer;
            border: none; border-radius: 5px;
            background-color: #007bff; color: white;
        }
        .btn-shift:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <h1 style="margin-bottom: 5px; font-size: 28px;">The Night Shift: Pro</h1>
    
    <div id="game-container">
        <div class="ui-panel">
            <div style="font-size: 18px; margin-bottom: 5px;">शिफ्ट: <span id="shift-name" style="color: #ffc107; font-weight:bold;">दोपहर (कॉमेडी)</span></div>
            <div>स्कोर/हेल्थ: <span id="score-display" style="color: #22c55e; font-weight:bold;">0</span></div>
            <div id="action-text" style="font-size: 13px; color: #ffeb3b; margin-top: 5px;"></div>
        </div>
        <canvas id="gameCanvas" width="800" height="450"></canvas>
    </div>

    <div class="controls-hint" id="controls-text">माउस से फोन पर क्लिक करके उसे नीचे गिराएं!</div>
    <button class="btn-shift" onclick="changeShift()">अगली शिफ्ट बदलें</button>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // UI Elements
        const shiftNameTxt = document.getElementById('shift-name');
        const scoreDisplay = document.getElementById('score-display');
        const actionText = document.getElementById('action-text');
        const controlsText = document.getElementById('controls-text');

        // Game States
        let currentShift = 0; // 0: Comedy, 1: Simulator, 2: Horror
        let score = 0;
        let health = 100;
        let gameOver = false;

        // Comedy Variables
        let phoneY = 300;
        let phoneSpeed = 1.5;

        // Simulator Variables
        let ecgY = 150;
        let ecgDirection = 1;
        let ecgTargetY = 150;

        // Horror Variables
        let playerX = 100;
        let ghostX = 700;
        let ghostY = 200;
        let ghostSpeed = 3;
        let keys = {};

        // Key listeners for Horror Mode
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        // Mouse click listener for Comedy and Simulator
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            if (currentShift === 0) {
                // फोन पर क्लिक चेक करें (फ़ोन 370xY साइज 60x90)
                if (mouseX >= 370 && mouseX <= 430 && mouseY >= phoneY && mouseY <= phoneY + 90) {
                    phoneY = 320; // फोन वापस नीचे
                    score += 10;
                    scoreDisplay.innerText = score;
                }
            } 
            else if (currentShift === 1) {
                // सिम्युलेटर में 'इंजेक्शन' बटन एरिया पर क्लिक
                if (mouseX >= 320 && mouseX <= 480 && mouseY >= 350 && mouseY <= 400) {
                    ecgTargetY = 150; // धड़कन सामान्य करें
                    score += 15;
                    scoreDisplay.innerText = score;
                }
            }
        });

        function changeShift() {
            currentShift = (currentShift + 1) % 3;
            gameOver = false;
            
            if (currentShift === 0) {
                shiftNameTxt.innerText = "दोपहर (कॉमेडी)";
                shiftNameTxt.style.color = "#ffc107";
                score = 0;
                scoreDisplay.innerText = score;
                controlsText.innerText = "माउस से उड़ते फोन पर क्लिक करके उसे नीचे गिराएं!";
            } else if (currentShift === 1) {
                shiftNameTxt.innerText = "शाम (सिम्युलेटर)";
                shiftNameTxt.style.color = "#2196f3";
                score = 0;
                scoreDisplay.innerText = score;
                controlsText.innerText = "जब धड़कन ऊपर-नीचे भागे, तो नीचे 'STABILIZE' बटन पर क्लिक करें!";
            } else if (currentShift === 2) {
                shiftNameTxt.innerText = "रात (सस्पेंस/हॉरर)";
                shiftNameTxt.style.color = "#ff3333";
                health = 100;
                scoreDisplay.innerText = health + "%";
                controlsText.innerText = "कीबोर्ड की Left / Right Arrow (या A/D) से भूत से दूर भागें!";
            }
        }

        // मेन गेम लूप (Main Game Loop)
        function updateAndDraw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // --- 1. कॉमेडी मोड ---
            if (currentShift === 0) {
                ctx.fillStyle = "#eef7fa";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                actionText.innerText = "मरीज को फोन से दूर रखें!";

                // मरीज का चेहरा
                ctx.beginPath(); ctx.arc(400, 200, 70, 0, Math.PI * 2);
                ctx.fillStyle = "#ffd43b"; ctx.fill(); ctx.stroke();
                ctx.fillStyle = "#000"; ctx.font = "20px Arial"; ctx.fillText("📱🤩", 375, 205);

                // फोन ऊपर की तरफ भागेगा
                phoneY -= phoneSpeed;
                if(phoneY < 50) {
                    phoneY = 320; // मिस होने पर वापस नीचे
                }

                // ड्रा फोन
                ctx.fillStyle = "#333";
                ctx.fillRect(370, phoneY, 60, 90);
                ctx.fillStyle = "#4dabf7";
                ctx.fillRect(375, phoneY + 5, 50, 65);
                ctx.fillStyle = "#fff";
                ctx.fillRect(395, phoneY + 75, 10, 10); // होम बटन
            }

            // --- 2. सिम्युलेटर मोड ---
            else if (currentShift === 1) {
                ctx.fillStyle = "#1e293b";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                actionText.innerText = "मरीज क्रिटिकल है!";

                // धड़कन की लाइन को अनियंत्रित करना
                ecgTargetY += ecgDirection * (Math.random() * 4);
                if(ecgTargetY > 280 || ecgTargetY < 50) ecgDirection *= -1;
                
                ecgY += (ecgTargetY - ecgY) * 0.1; // स्मूथ ट्रांजिशन

                // ECG मॉनिटर ग्रिड और लाइन
                ctx.strokeStyle = "#0f172a"; ctx.lineWidth = 2;
                for(let i=0; i<canvas.width; i+=40) {
                    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
                }

                // हार्ट रेट लाइन ड्रा करें
                ctx.strokeStyle = (Math.abs(150 - ecgY) > 50) ? "#ef4444" : "#22c55e";
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.moveTo(100, 150);
                ctx.lineTo(300, 150); ctx.lineTo(350, ecgY); ctx.lineTo(400, 300 - ecgY); ctx.lineTo(450, 150);
                ctx.lineTo(700, 150);
                ctx.stroke();

                // स्टेबलाइज बटन (क्लिक करने के लिए)
                ctx.fillStyle = "#e11d48";
                ctx.fillRect(320, 350, 160, 50);
                ctx.fillStyle = "#fff";
                ctx.font = "bold 18px sans-serif";
                ctx.fillText("STABILIZE", 355, 382);
            }

            // --- 3. हॉरर मोड ---
            else if (currentShift === 2) {
                ctx.fillStyle = "#09090b";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                actionText.innerText = "🚨 भागो! वह आ रहा है!";

                if (!gameOver) {
                    // प्लेयर मूवमेंट (A/D या एरो कीज़)
                    if (keys['KeyA'] || keys['ArrowLeft']) playerX -= 4;
                    if (keys['KeyD'] || keys['ArrowRight']) playerX += 4;

                    // बाउंड्री लॉक
                    if (playerX < 20) playerX = 20;
                    if (playerX > 760) playerX = 760;

                    // भूत प्लेयर की तरफ बढ़ेगा
                    if (ghostX < playerX) ghostX += ghostSpeed;
                    else ghostX -= ghostSpeed;

                    // भूत हवा में ऊपर नीचे होगा (सिर्फ डराने के लिए)
                    ghostY = 200 + Math.sin(Date.now() / 200) * 30;

                    // कोलिशन डिटेक्शन (टकराव)
                    let dist = Math.abs(playerX - ghostX);
                    if (dist < 40) {
                        health -= 1;
                        scoreDisplay.innerText = health + "%";
                        if (health <= 0) gameOver = true;
                    }
                }

                // टॉर्च इफ़ेक्ट (लाइट सर्कल)
                ctx.save();
                // डॉक्टर (खिलाड़ी)
                ctx.fillStyle = "#fff";
                ctx.beginPath(); ctx.arc(playerX, 300, 20, 0, Math.PI * 2); ctx.fill(); // सिर
                ctx.fillRect(playerX - 10, 320, 20, 50); // बॉडी

                // भूतिया मरीज
                ctx.fillStyle = "rgba(239, 68, 68, 0.7)";
                ctx.beginPath(); ctx.arc(ghostX, ghostY, 25, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = "#000"; ctx.fillText("👁 👁", ghostX - 18, ghostY + 5);

                // टॉर्च मास्क (अंधेरा फैलाना सिर्फ डॉक्टर के आस-पास रोशनी छोड़कर)
                let gradient = ctx.createRadialGradient(playerX, 320, 30, playerX, 320, 180);
                gradient.addColorStop(0, 'transparent');
                gradient.addColorStop(1, 'rgba(0, 0, 0, 0.92)');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.restore();

                if (gameOver) {
                    ctx.fillStyle = "#ef4444";
                    ctx.font = "bold 40px sans-serif";
                    ctx.fillText("मरीज ने पकड़ लिया! GAME OVER", 140, 220);
                }
            }

            requestAnimationFrame(updateAndDraw);
        }

        // गेम शुरू करें
        updateAndDraw();
    </script>
</body>
</html>
