<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Night Shift: Doctor's Nightmare</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }
        canvas {
            border: 4px solid #333;
            border-radius: 8px;
            background-color: #fff;
        }
        .ui-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 5px;
            pointer-events: none;
        }
        .btn-action {
            margin-top: 15px;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #28a745;
            color: white;
        }
        .btn-action:hover { background-color: #218838; }
    </style>
</head>
<body>

    <h1 style="margin-bottom: 5px;">The Night Shift</h1>
    <p style="margin-top: 0; color: #aaa;">शिफ्ट बदलें और गेम का मूड देखें!</p>

    <div id="game-container">
        <div class="ui-panel">
            <div>शिफ्ट: <span id="shift-display" style="font-weight: bold; color: #ffc107;">दोपहर (कॉमेडी)</span></div>
            <div>मरीज की स्थिति: <span id="status-display">मजेदार मूड में</span></div>
        </div>
        <canvas id="gameCanvas" width="800" height="450"></canvas>
    </div>

    <button class="btn-action" onclick="nextShift()">अगली शिफ्ट में जाएं</button>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const shiftDisplay = document.getElementById('shift-display');
        const statusDisplay = document.getElementById('status-display');

        // गेम स्टेट्स: 0 = कॉमेडी, 1 = सिम्युलेटर, 2 = हॉरर
        let currentShift = 0; 

        // शिफ्ट की सेटिंग्स
        const shiftSettings = [
            { name: "दोपहर (कॉмеडी)", bg: "#eef7fa", text: "व्हाट्सएप यूनिवर्सिटी का मरीज: इसे फोन से दूर रखें!", color: "#000", status: "मरीज रील बना रहा है 📱" },
            { name: "शाम (सीरियस सिम्युलेटर)", bg: "#d1d5db", text: "इमर्जन्सी सर्जरी: टांके लगाने के लिए क्लिक करें!", color: "#000", status: "हार्ट रेट: 72 BPM 💓" },
            { name: "रात (सस्पेंस/हॉरर)", bg: "#0d0e12", text: "🚨 भागो! भूतिया मरीज जाग गया है!", color: "#ff3333", status: "खतरा! बत्तियां गुल हैं 🔦" }
        ];

        function drawGame() {
            let setting = shiftSettings[currentShift];
            
            // 1. बैकग्राउंड साफ़ करें और रंग बदलें
            ctx.fillStyle = setting.bg;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 2. हर शिफ्ट के हिसाब से माहौल (Vibe) सेट करें
            if (currentShift === 0) {
                // कॉमेडी मोड: कार्टूनिश कैरेक्टर (पीला स्माइली मरीज)
                ctx.beginPath();
                ctx.arc(400, 200, 60, 0, Math.PI * 2);
                ctx.fillStyle = "#ffd43b";
                ctx.fill();
                ctx.stroke();
                
                // आँखें और फनी चश्मा
                ctx.fillStyle = "#000";
                ctx.fillRect(360, 180, 25, 15);
                ctx.fillRect(415, 180, 25, 15);
                ctx.strokeStyle = "#000";
                ctx.lineWidth = 4;
                ctx.beginPath(); ctx.moveTo(385, 187); ctx.lineTo(415, 187); ctx.stroke();
                
                // बड़ी मुस्कान
                ctx.beginPath();
                ctx.arc(400, 210, 25, 0, Math.PI);
                ctx.stroke();

            } else if (currentShift === 1) {
                // सीरियस सिम्युलेटर: ऑपरेशन टेबल और हार्ट मॉनिटर लाइन
                ctx.strokeStyle = "#333";
                ctx.lineWidth = 8;
                ctx.strokeRect(200, 250, 400, 40); // बेड
                
                // हार्ट रेट ग्राफ (ECG Line)
                ctx.strokeStyle = "#22c55e";
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(100, 100);
                ctx.lineTo(200, 100); ctx.lineTo(220, 70); ctx.lineTo(240, 130); ctx.lineTo(260, 100);
                ctx.lineTo(400, 100); ctx.lineTo(420, 70); ctx.lineTo(440, 130); ctx.lineTo(460, 100);
                ctx.lineTo(700, 100);
                ctx.stroke();

            } else if (currentShift === 2) {
                // हॉरर मोड: अंधेरा और टॉर्च इफ़ेक्ट (Vignette)
                // लाल चमकती आँखें
                ctx.fillStyle = "#ff0000";
                ctx.beginPath(); ctx.arc(350, 200, 8, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(450, 200, 8, 0, Math.PI*2); ctx.fill();

                // टॉर्च की रोशनी का भ्रम (सिंपल ओवरले)
                let gradient = ctx.createRadialGradient(400, 225, 50, 400, 225, 300);
                gradient.addColorStop(0, 'transparent');
                gradient.addColorStop(1, 'rgba(0, 0, 0, 0.95)');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            // 3. निर्देश टेक्स्ट लिखें
            ctx.fillStyle = setting.color;
            ctx.font = "bold 24px 'Segoe UI'";
            ctx.textAlign = "center";
            ctx.fillText(setting.text, canvas.width / 2, 380);
        }

        function nextShift() {
            // अगली शिफ्ट पर जाएं (0 -> 1 -> 2 -> 0)
            currentShift = (currentShift + 1) % 3;
            
            // UI अपडेट करें
            let setting = shiftSettings[currentShift];
            shiftDisplay.innerText = setting.name;
            statusDisplay.innerText = setting.status;
            
            if(currentShift === 2) {
                shiftDisplay.style.color = "#ff3333";
            } else if(currentShift === 1) {
                shiftDisplay.style.color = "#2196f3";
            } else {
                shiftDisplay.style.color = "#ffc107";
            }

            // स्क्रीन दोबारा ड्रा करें
            drawGame();
        }

        // गेम की पहली ड्राइंग
        drawGame();
    </script>
</body>
</html>
