<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Night Shift: Funny Doctor</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #111; color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
        }
        #game-container { position: relative; }
        canvas {
            border: 4px solid #333; border-radius: 8px;
            background-color: #fff; cursor: pointer;
        }
        .ui-panel {
            position: absolute; top: 10px; left: 10px;
            background: rgba(0,0,0,0.85); padding: 12px 20px;
            border-radius: 6px; pointer-events: none; min-width: 200px;
        }
        .controls-hint {
            margin-top: 10px; font-size: 14px; color: #aaa; text-align: center;
        }
        .btn-shift {
            margin-top: 15px; padding: 12px 24px;
            font-size: 16px; font-weight: bold; cursor: pointer;
            border: none; border-radius: 5px;
            background-color: #28a745; color: white;
        }
        .btn-shift:hover { background-color: #218838; }
    </style>
</head>
<body>

    <h1 style="margin-bottom: 5px; font-size: 28px;">The Night Shift: Funny Doctor</h1>
    
    <div id="game-container">
        <div class="ui-panel">
            <div style="font-size: 18px; margin-bottom: 5px;">शिफ्ट: <span id="shift-name" style="color: #ffc107; font-weight:bold;">दोपहर (कॉमेडी)</span></div>
            <div>स्कोर / लाइव्स: <span id="score-display" style="color: #22c55e; font-weight:bold;">0</span></div>
            <div id="action-text" style="font-size: 13px; color: #ffeb3b; margin-top: 5px;"></div>
        </div>
        <canvas id="gameCanvas" width="800" height="450"></canvas>
    </div>

    <div class="controls-hint" id="controls-text">माउस से फोन पर क्लिक करके उसे नीचे गिराएं!</div>
    <button class="btn-shift" onclick="changeShift()">अगली मजेदार शिफ्ट बदलें</button>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // UI Elements
        const shiftNameTxt = document.getElementById('shift-name');
        const scoreDisplay = document.getElementById('score-display');
        const actionText = document.getElementById('action-text');
        const controlsText = document.getElementById('controls-text');

        // Game States
        let currentShift = 0; 
        let score = 0;
        let lives = 3;
        let gameOver = false;

        // Comedy 1 Variables (Phone)
        let phoneY = 300;
        let phoneSpeed = 1.8;

        // Simulator Variables (ECG)
        let ecgY = 150;
        let ecgDirection = 1;
        let ecgTargetY = 150;

        // Night Comedy Variables (Sleepwalking Dance)
        let doctorX = 100;
        let patientX = 700;
        let patientSpeed = 2.5;
        let danceOffset = 0;
        let keys = {};

        // Pillow Weapon Variables
        let pillowX = -100; 
        let pillowY = 350;
        let isPillowActive = false;
        let isPatientAsleep = false;
        let sleepTimer = 0;

        // Key listeners
        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            
            // अब Space की जगह 'W' या 'Up Arrow' दबाने पर तकिया फिंकेगा
            if ((e.code === 'KeyW' || e.code === 'ArrowUp') && currentShift === 2 && !isPillowActive && !isPatientAsleep && !gameOver) {
                pillowX = doctorX; 
                isPillowActive = true;
            }
        });
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        // Click handler
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            if (currentShift === 0) {
                if (mouseX >= 370 && mouseX <= 430 && mouseY >= phoneY && mouseY <= phoneY + 90) {
                    phoneY = 320; 
                    score += 10;
                    scoreDisplay.innerText = score;
                }
            } 
            else if (currentShift === 1) {
                if (mouseX >= 320 && mouseX <= 480 && mouseY >= 350 && mouseY <= 400) {
                    ecgTargetY = 150; 
                    score += 15;
                    scoreDisplay.innerText = score;
                }
            }
        });

        function changeShift() {
            currentShift = (currentShift + 1) % 3;
            gameOver = false;
            isPillowActive = false;
            isPatientAsleep = false;
            pillowX = -100;
            
            if (currentShift === 0) {
                shiftNameTxt.innerText = "दोपहर (कॉमेडी)";
                shiftNameTxt.style.color = "#ffc107";
                score = 0;
                scoreDisplay.innerText = score;
                controlsText.innerText = "माउस से उड़ते फोन पर क्लिक करके उसे नीचे गिराएं!";
            } else if (currentShift === 1) {
                shiftNameTxt.innerText = "शाम (सिम्युलेटर)";
                shiftNameTxt.style.color = "#2196f3";
                score = 0;
                scoreDisplay.innerText = score;
                controlsText.innerText = "जब धड़कन ऊपर-नीचे भागे, तो नीचे 'STABILIZE' बटन पर क्लिक करें!";
            } else if (currentShift === 2) {
                shiftNameTxt.innerText = "रात की शिफ्ट (नींद में डांस)";
                shiftNameTxt.style.color = "#e040fb";
                lives = 3;
                scoreDisplay.innerText = "लाइव्स: " + lives;
                controlsText.innerText = "A/D या Left/Right से भागें और 'W' या 'Up Arrow' दबाकर तकिया फेंकें!";
            }
        }

        function updateAndDraw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (currentShift === 0) {
                ctx.fillStyle = "#eef7fa";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                actionText.innerText = "मरीज रील्स बनाने के लिए फोन मांग रहा है!";

                ctx.beginPath(); ctx.arc(400, 200, 70, 0, Math.PI * 2);
                ctx.fillStyle = "#ffd43b"; ctx.fill(); ctx.stroke();
                ctx.fillStyle = "#000"; ctx.font = "20px Arial"; ctx.fillText("📱🤩", 375, 205);

                phoneY -= phoneSpeed;
                if(phoneY < 50) phoneY = 320;

                ctx.fillStyle = "#333"; ctx.fillRect(370, phoneY, 60, 90);
                ctx.fillStyle = "#4dabf7"; ctx.fillRect(375, phoneY + 5, 50, 65);
                ctx.fillStyle = "#fff"; ctx.fillRect(395, phoneY + 75, 10, 10);
            }

            else if (currentShift === 1) {
                ctx.fillStyle = "#1e293b";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                actionText.innerText = "मरीज को ज्यादा मिर्च खाने से गैस हो गई है!";

                ecgTargetY += ecgDirection * (Math.random() * 5);
                if(ecgTargetY > 280 || ecgTargetY < 50) ecgDirection *= -1;
                ecgY += (ecgTargetY - ecgY) * 0.1;

                ctx.strokeStyle = "#0f172a"; ctx.lineWidth = 2;
                for(let i=0; i<canvas.width; i+=40) {
                    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
                }

                ctx.strokeStyle = (Math.abs(150 - ecgY) > 50) ? "#ef4444" : "#22c55e";
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.moveTo(100, 150);
                ctx.lineTo(300, 150); ctx.lineTo(350, ecgY); ctx.lineTo(400, 300 - ecgY); ctx.lineTo(450, 150);
                ctx.lineTo(700, 150);
                ctx.stroke();

                ctx.fillStyle = "#ff9800"; ctx.fillRect(320, 350, 160, 50);
                ctx.fillStyle = "#fff"; ctx.font = "bold 16px sans-serif"; ctx.fillText("GIVE ANTACID", 342, 381);
            }

            else if (currentShift === 2) {
                ctx.fillStyle = "#311b92"; 
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                danceOffset += 0.05;
                ctx.fillStyle = `rgba(255, 255, 0, ${Math.sin(danceOffset) * 0.15 + 0.1})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                if (!gameOver) {
                    // डॉक्टर मूवमेंट
                    if (keys['KeyA'] || keys['ArrowLeft']) doctorX -= 5;
                    if (keys['KeyD'] || keys['ArrowRight']) doctorX += 5;

                    if (doctorX < 20) doctorX = 20;
                    if (doctorX > 760) doctorX = 760;

                    let danceY = 280;

                    if (isPatientAsleep) {
                        actionText.innerText = "💤 मरीज सो रहा है! जल्दी से पास से निकल जाओ!";
                        danceY = 320; 
                        sleepTimer--;
                        if (sleepTimer <= 0) {
                            isPatientAsleep = false;
                        }
                    } else {
                        actionText.innerText = "मरीज नींद में नागिन डांस कर रहा है! 'W' से तकिया फेंको!";
                        if (patientX < doctorX) patientX += patientSpeed;
                        else patientX -= patientSpeed;

                        danceY = 280 + Math.sin(Date.now() / 150) * 40; 

                        // चेक करें क्या मरीज तकिये के ऊपर आया
                        if (isPillowActive && Math.abs(patientX - pillowX) < 30) {
                            isPillowActive = false;
                            isPatientAsleep = true;
                            sleepTimer = 180; // 3 सेकंड के लिए सोएगा
                            pillowX = -100;
                        }

                        // डॉक्टर से टकराव
                        if (Math.abs(doctorX - patientX) < 35 && Math.abs(320 - danceY) < 50) {
                            lives -= 1;
                            patientX = (doctorX < 400) ? 700 : 100; 
                            scoreDisplay.innerText = "लाइव्स: " + lives;
                            if (lives <= 0) gameOver = true;
                        }
                    }

                    // तकिया ड्रा करें
                    if (isPillowActive) {
                        ctx.fillStyle = "#e0e0e0";
                        ctx.fillRect(pillowX - 15, pillowY, 30, 20); 
                        ctx.strokeStyle = "#9e9e9e"; ctx.strokeRect(pillowX - 15, pillowY, 30, 20);
                    }

                    // डॉक्टर ड्रा करें
                    ctx.fillStyle = "#22c55e";
                    ctx.beginPath(); ctx.arc(doctorX, 300, 20, 0, Math.PI * 2); ctx.fill(); 
                    ctx.fillRect(doctorX - 12, 320, 24, 50); 
                    ctx.fillStyle = "#fff"; ctx.font = "14px Arial"; ctx.fillText("👨‍⚕️", doctorX - 10, 315);

                    // मरीज ड्रा करें
                    ctx.fillStyle = "#ff4081";
                    ctx.beginPath(); ctx.arc(patientX, danceY, 22, 0, Math.PI * 2); ctx.fill();
                    ctx.fillRect(patientX - 12, danceY + 22, 24, 45);
                    ctx.fillStyle = "#fff"; ctx.font = "16px Arial"; 
                    ctx.fillText(isPatientAsleep ? "😴💤" : "😴🕺", patientX - 15, danceY + 10);
                }

                if (gameOver) {
                    ctx.fillStyle = "#ffeb3b";
                    ctx.font = "bold 35px sans-serif";
                    ctx.fillText("मरीज ने गले लगा लिया! 😴 GAME OVER", 140, 220);
                }
            }

            requestAnimationFrame(updateAndDraw);
        }

        updateAndDraw();
    </script>
</body>
</html>
